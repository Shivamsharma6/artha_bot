server {
    listen 8765 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /ws {
        proxy_pass http://arthabot:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 75s;
    }

    location /api/health {
        proxy_pass http://arthabot:8080/health;
        proxy_set_header Host $host;
    }

    location /api/auth/zerodha {
        proxy_pass http://arthabot:8080/auth/zerodha;
        proxy_set_header Host $host;
        proxy_set_header X-ArthaBot-Admin-Token $http_x_arthabot_admin_token;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

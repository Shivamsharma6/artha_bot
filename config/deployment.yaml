environment: "paper-local"
mode: "PAPER"
live_enabled: false
scheduler:
  timezone: "Asia/Kolkata"
  jobs:
    - name: "instrument-refresh-nse"
      type: "instrument_refresh"
      enabled: true
      critical: true
      run_at: "08:30"
    - name: "news-ingest-core-watchlist"
      type: "news_ingestion"
      enabled: true
      critical: false
      run_at: "08:45"
      symbols:
        - "INFY"
        - "RELIANCE"
        - "TCS"
    - name: "live-feed-supervision"
      type: "live_feed_supervision"
      enabled: true
      critical: true
      run_at: "09:00"
    - name: "broker-state-reconciliation"
      type: "broker_reconciliation"
      enabled: true
      critical: true
      run_at: "09:05"
    - name: "forced-intraday-square-off"
      type: "forced_square_off"
      enabled: true
      critical: true
      run_at: "15:15"
    - name: "operational-learning-rerun"
      type: "learning_rerun"
      enabled: true
      critical: false
      run_at: "16:00"
    - name: "strategy-calibration-rerun"
      type: "strategy_calibration"
      enabled: true
      critical: false
      run_at: "16:30"
